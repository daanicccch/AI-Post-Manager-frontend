services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${FRONTEND_VITE_API_BASE_URL:-/api}
    container_name: ${FRONTEND_CONTAINER_NAME:-channelbot-frontend}
    restart: unless-stopped
    environment:
      API_PROXY_TARGET: ${API_PROXY_TARGET:-http://host.docker.internal:3010}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${FRONTEND_PORT:-8080}:80"
